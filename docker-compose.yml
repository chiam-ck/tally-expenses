# App only. Postgres is external (on db-host), reached over the tailnet via DATABASE_URL.
# network_mode: host lets the container resolve/reach *.ts.net through app-host's
# tailscale interface and binds uvicorn directly on 0.0.0.0:8000.
services:
  app:
    build: .
    image: expenses-app:latest
    container_name: expenses-app
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    # With network_mode: host the container shares the host network namespace,
    # so uvicorn's --host 0.0.0.0 --port 8000 (from the Dockerfile CMD) is reachable
    # at app-host's tailnet address on :8000. No `ports:` mapping is used/needed.

  # Streamable-HTTP MCP front for external AI agents (e.g. Hermes) on the tailnet.
  # Talks to the app over the host network at localhost:8000 using the API key.
  # Reachable at http://<host>:9000/mcp. ${API_KEY} is interpolated from .env.
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: tally-mcp:latest
    container_name: tally-mcp
    restart: unless-stopped
    depends_on:
      - app
    network_mode: host
    environment:
      - TALLY_BASE_URL=http://localhost:8000
      - TALLY_API_KEY=${API_KEY}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9000
